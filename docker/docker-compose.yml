services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LOG_FILE_PATH: /app/logs/shellvault.log
    volumes:
      - keys:/app/keys
      - logs:/app/logs
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  backup:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint: ["./shellvault-cli", "backup", "auto"]
    env_file:
      - ../.env
    environment:
      BACKUP_DIR: /backups
      BACKUP_INTERVAL: "${BACKUP_INTERVAL:-24h}"
      BACKUP_RETENTION: "${BACKUP_RETENTION:-7}"
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shellvault
      POSTGRES_USER: shellvault
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shellvault"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  backups:
  keys:
  logs:
